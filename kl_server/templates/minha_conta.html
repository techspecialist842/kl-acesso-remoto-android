<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha conta - {{ branding.nome_marca }}</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 24px; color: #222; }
        .topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 10px #0001; max-width: 520px; }
        label { display: block; font-weight: 600; margin: 12px 0 6px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button, .botao {
            padding: 10px 16px; border: none; border-radius: 8px; background: #1d4ed8; color: #fff;
            cursor: pointer; text-decoration: none; display: inline-block; margin-top: 16px; font-size: 14px;
        }
        .status { margin-top: 12px; padding: 10px; border-radius: 8px; display: none; }
        .status.ok { display: block; background: #e8f8ee; color: #166534; }
        .status.erro { display: block; background: #fdecec; color: #991b1b; }
        .info { color: #64748b; font-size: 14px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div class="topo">
        <div>
            <h1>Minha conta</h1>
            <p class="info" style="margin:0;">Altere seu usuario, nome e senha de acesso</p>
        </div>
        <a class="botao" href="/painel" style="background:#222;">Voltar ao painel</a>
    </div>

    <div class="card">
        <p class="info">
            Logado como <strong>{{ usuario.usuario }}</strong>
            {% if usuario.is_admin %}(administrador){% endif %}
        </p>
        <form id="form-conta">
            <label for="usuario">Usuario de login</label>
            <input id="usuario" name="usuario" value="{{ usuario.usuario }}" required minlength="3">

            <label for="nome">Nome exibido</label>
            <input id="nome" name="nome" value="{{ usuario.nome }}" required>

            <label for="senha_nova">Nova senha</label>
            <input id="senha_nova" name="senha_nova" type="password" minlength="4" placeholder="Deixe em branco para manter">

            <label for="senha_atual">Senha atual (obrigatoria para salvar)</label>
            <input id="senha_atual" name="senha_atual" type="password" required minlength="4">

            <button type="submit">Salvar alteracoes</button>
        </form>
        <div class="status" id="status"></div>
    </div>

    <script>
        const status = document.getElementById("status");
        document.getElementById("form-conta").addEventListener("submit", async (e) => {
            e.preventDefault();
            const dados = Object.fromEntries(new FormData(e.target).entries());
            const res = await fetch("/api/minha-conta", {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dados)
            });
            const json = await res.json();
            if (!res.ok) {
                status.className = "status erro";
                status.textContent = json.erro || "Erro ao salvar";
                return;
            }
            status.className = "status ok";
            status.textContent = "Conta atualizada com sucesso!";
            setTimeout(() => location.reload(), 900);
        });
    </script>
</body>
</html>
